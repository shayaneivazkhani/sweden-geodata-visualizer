        /*—————————————————————————————————————————————————————————————————————————————————————————————————————————————————————————*/
        body {
          overflow: auto;
        }
        body {
              margin: 0; /* Remove default margin */
              padding: 0; /* Remove default padding */

              /*overflow-x: hidden; Prevent horizontal scrollbar */
              /*min-width: 800px;  dont let user be able to make the window smaller than 600 pixels */

              /*background-color: rgb(12, 29, 50);*/ /* Set background color */

              /*background: rgb(0,0,0);*/
              /*background: linear-gradient(0deg, rgb(20, 22, 42) 0%, #352073 100%);*/
              /*background: linear-gradient(0.36turn, #0a2c3c, #1e43a1, #412dc0, #430e59);*/

              background: linear-gradient(95deg, #193674, #350e70, #151e75, #671ca1);
              background-size: 800% 800%;

              -webkit-animation: AnimationName 18s ease infinite;
              -moz-animation: AnimationName 18s ease infinite;
              animation: AnimationName 18s ease infinite;
          }
          /* Scrollbar—————————————————————————————————————————————————————————————————————————————————————————————————————————————————————————*/
        

          @media only screen and (min-width: 100px) and (max-width: 900px) {
            body::-webkit-scrollbar {
            width: 8px;
            height: 8px;
              background-color: rgb(0, 0, 0);
            }
          }
          @media only screen and (min-width: 901px) and (max-width: 1300px) {
            body::-webkit-scrollbar {
              width: 0.8vw;
              height: 0.8vw;
              background-color: rgb(0, 0, 0);
            }
          }
          @media only screen and (min-width: 1301px) and (max-width: 50000px) {
            body::-webkit-scrollbar {
              width: 0.6vw;
              height: 0.6vw;
              background-color: rgb(0, 0, 0);
            }
          }

          body::-webkit-scrollbar:hover {
            background-color: rgb(0, 0, 0);
          }
          body::-webkit-scrollbar-track {
              background-color: rgba(0, 171, 193, 0);
              border-radius:9999px;
          }
          body::-webkit-scrollbar-track:hover {
               /*background-color: rgba(0,172,193, 0.89); */
          }
          body::-webkit-scrollbar-thumb {
            background-color: rgba(255, 134, 18, 0.98);
            /*border-color: rgba(94, 222, 55, 0.87); */
            border-radius: 9999px;
            border: width 10px;
          }
          body::-webkit-scrollbar-thumb:hover {
            background-color:rgba(255,106,50, 0.97);
          }
          /*—————————————————————————————————————————————————————————————————————————————————————————————————————————————————————————*/
          @-webkit-keyframes AnimationName {
              0%{background-position:81% 0%}
              50%{background-position:20% 100%}
              100%{background-position:81% 0%}
          }
          @-moz-keyframes AnimationName {
              0%{background-position:81% 0%}
              50%{background-position:20% 100%}
              100%{background-position:81% 0%}
          }
          @keyframes AnimationName {
              0%{background-position:81% 0%}
              50%{background-position:20% 100%}
              100%{background-position:81% 0%}
          }
      </style>
