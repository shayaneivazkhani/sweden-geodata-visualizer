    /* Scrollbar—————————————————————————————————————————————————————————————————————————————————————————————————————————————————————————*/

    /*
      The -webkit-scrollbar family of properties consists of seven
    different pseudo-elements that, together, comprise a full scrollbar UI
    element:
              1. ::-webkit-scrollbar addresses the background of the bar itself. It is usually covered by the other elements
              2. :: -webkit-scrollbar-button addresses the directional buttons on the scrollbar
              3. ::-webkit-scrollbar-track addresses the empty space "below" the progress bar
              4. ::-webkit-scrollbar-track-piece is the top-most layer of thethe progress bar not covered by the draggable scrolling element (thumb)
              5. ::-webkit-scrollbar-thumb addresses the draggable scrolling element that resizes depending on the size of the scrollable element
              6. ::-webkit-scrollbar-corner addresses the (usually) bottom corner of the scrollable element, where two scrollbars might meet
              7. ::-webkit-resizer addresses the draggable resizing handle that appears above the scrollbar-corner at the bottom corner of some elements
    */

    @media only screen and (min-width: 100px) and (max-width: 900px) {
      body::-webkit-scrollbar {
        width: 8px;
        height: 8px;
        background-color: rgb(0, 0, 0);
      }
    }

    @media only screen and (min-width: 901px) and (max-width: 1300px) {
      body::-webkit-scrollbar {
        width: 0.8vw;
        height: 0.8vw;
        background-color: rgb(0, 0, 0);
      }
    }

    @media only screen and (min-width: 1301px) and (max-width: 50000px) {
      body::-webkit-scrollbar {
        width: 0.6vw;
        height: 0.6vw;
        background-color: rgb(0, 0, 0);
      }
    }

    body::-webkit-scrollbar:hover {

    }

    body::-webkit-scrollbar-track {

      border-radius: 9999px;
    }

    body::-webkit-scrollbar-track:hover {
      /*background-color: rgba(0,172,193, 0.89); */
    }

      /*border-color: rgba(94, 222, 55, 0.87); */
      border-radius: 9999px;

    }

    body::-webkit-scrollbar-thumb:hover {

    }

  <!-- Disable USER right-clicking =>  oncontextmenu="return false" -->
  <body oncontextmenu="return false">


    <div id="root">
      <!-- The APP goes in here -->
    </div>

    <script>
      // Read mode value from localStorage
      const darkModeValue = localStorage.getItem('darkMode');
      const darkMode = darkModeValue ? JSON.parse(darkModeValue) : true;

      // Update body class attribute based on mode value
      const body = document.body;
      if (darkMode) {
        body.classList.add('dark');
        body.classList.remove('light');
      } else {
        body.classList.add('light');
        body.classList.remove('dark');
      }
    </script>
